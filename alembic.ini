[alembic]
script_location = alembic
# URL is loaded dynamically from .env in alembic/env.py — this is a required
# key but its value is overridden at runtime.
sqlalchemy.url = postgresql+asyncpg://meeting:meeting@localhost:5434/meeting_intel

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
